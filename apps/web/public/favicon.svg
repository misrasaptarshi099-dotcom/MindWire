<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer glowing ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00D4FF" stroke-width="2" stroke-dasharray="4 2" opacity="0.8" />
  <!-- Robot/Chip main head structure -->
  <rect x="8" y="10" width="16" height="14" rx="3" fill="#0A0F1E" stroke="#00D4FF" stroke-width="2" />
  <!-- Antennas -->
  <line x1="16" y1="10" x2="16" y2="5" stroke="#9A4DFF" stroke-width="2" />
  <circle cx="16" cy="4" r="2" fill="#9A4DFF" />
  <!-- Glowing Eyes -->
  <circle cx="12" cy="16" r="2" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="20" cy="16" r="2" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <!-- Circuit mouth/traces -->
  <line x1="12" y1="21" x2="20" y2="21" stroke="#9A4DFF" stroke-width="1.5" />
  <!-- Decorative side pins -->
  <line x1="6" y1="14" x2="8" y2="14" stroke="#00D4FF" stroke-width="1.5" />
  <line x1="6" y1="18" x2="8" y2="18" stroke="#00D4FF" stroke-width="1.5" />
  <line x1="24" y1="14" x2="26" y2="14" stroke="#00D4FF" stroke-width="1.5" />
  <line x1="24" y1="18" x2="26" y2="18" stroke="#00D4FF" stroke-width="1.5" />
</svg>